# personal-agent — example deployment config.
# Copy to config.<name>.yml and point PERSONAL_AGENT_CONFIG at it (see start.sh).
# Secrets do NOT live here — bot credentials come from env vars (see start.sh):
#   PERSONAL_AGENT_HOMESERVER / PERSONAL_AGENT_USER_ID / PERSONAL_AGENT_ACCESS_TOKEN

# Who may drive the conversation. Messages from anyone else are silently ignored.
trusted_sender: "@you:example.org"
mention_user: "@you:example.org"

poll_interval_seconds: 5
max_message_length: 4000
subprocess_timeout_seconds: 600
startup_notification: true

# Roll the session at this input-token fill. The default suits the design model
# (Sonnet: 200k window, ~167k auto-compact trigger). If you pin a different model
# below (e.g. a 1M-window model), re-derive this against that window.
rollover_budget: 130000

deployment:
  # Persona name — used in notes/tags and the startup notice. This file is the
  # only place the name lives; nothing in the code hard-codes it.
  name: "harlock"

  # Pin the model the rollover budget assumes. Omit to inherit the host default
  # (NOT recommended — the budget math depends on a known context window).
  model: "claude-sonnet-4-6"

  # The room this agent lives in (one continuous conversation).
  room_id: "!yourRoomId:example.org"

  # Local timezone for the per-turn [time: …] tag.
  timezone: "America/New_York"

  # Path to the claude binary the manager launches.
  claude_bin: "/usr/local/bin/claude"

  # If set, launch the session as this OS user via:
  #   sudo -n -u <agent_user> -- <claude_bin> ...
  # Requires a NOPASSWD sudoers grant scoped to exactly that command.
  # Omit (or leave empty) to run claude as the same user as the manager.
  agent_user: "agent-harlock"

  # cwd for the launched session — where the agent's CLAUDE.md / .mcp.json /
  # settings.json live. claude derives its project (and transcript path) from this.
  project_dir: "/home/agent-harlock/.claude/projects/harlock"

  # Agent's home — only used by !mirror to locate local transcripts. In an
  # isolated deployment the manager cannot read these (0600); !mirror no-ops.
  agent_home: "/home/agent-harlock"

  # Durable rollover handoff notes (manager-owned, memsearch-indexed working tier).
  working_note_dir: "/home/you/.claude/memory/agents/harlock/working"

  # Idle-harvest session notes (manager-owned, memsearch-indexed session tier).
  session_note_dir: "/home/you/.claude/memory/agents/harlock/session"

  # Rollover handoff summarization via Ollama. Omit ollama_model to disable and
  # always use the raw last-N-turn tail (the plan's fallback).
  ollama_url: "http://localhost:11434"
  ollama_model: "summarize:latest"
  ollama_timeout: 60

  # Cold-start memsearch injection: absolute path to the memsearch CLI the
  # manager can run. Omit to disable injection.
  memsearch_bin: "/home/you/.local/bin/memsearch"

# Prune rolled/expired sessions (and their turns) after this many days.
session_retention_days: 30
