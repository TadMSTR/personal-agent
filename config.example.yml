# personal-agent runtime config (template — copy to config.yml and fill in)
# config.yml is gitignored; never commit live credentials or room IDs.

# Polling cadence and chunking.
poll_interval_seconds: 5
max_message_length: 4000

# Logical Matrix room the agent watches. Override per-deployment.
room_id: "!ROOMID:your.homeserver"

# Operator mxid — only messages from this sender are processed. Other senders
# are silently dropped at the gate (security flag B in dispatcher.py).
operator_user_id: "@your-user:your.homeserver"

# claude-code project directory the agent runs from.
project_dir: "/home/user/.claude/projects/personal-agent"

# Claude subprocess timeout (seconds). Personal-agent conversations can run
# longer than dispatcher tasks; default is generous.
subprocess_timeout_seconds: 1800

# Retention for session metadata in SQLite (days).
session_retention_days: 30

# v0.2 — idle-based session rollover.
# When an active session has not received a message for idle_threshold_seconds,
# the idle monitor generates a handoff summary, retires the session, and
# allocates a new session_id. Continuity is injected on the next user message.
idle_threshold_seconds: 1800
idle_check_interval_seconds: 60

# v0.3 — context window size used as the denominator for token_fill_pct.
# Sized for the current Claude context window; lift if Anthropic ships a larger one.
context_window_tokens: 200000

# Optional: post a startup notification to the room when the manager comes up.
startup_notify: true
